<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bean pet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --bg-card: #16213e;
    --bg-card-hover: #1a2742;
    --text: #e0d6c8;
    --text-dim: #8b8077;
    --text-bright: #f5ebe0;
    --accent: #b8860b;
    --accent-glow: rgba(184, 134, 11, 0.15);
    --accent-soft: #d4a857;
    --green: #7eb89a;
    --violet: #b09ac4;
    --coral: #d98a8a;
    --blue: #7da7c9;
    --amber: #d4a857;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    line-height: 1.6;
  }

  .container {
    max-width: 600px;
    width: 100%;
  }

  h1 {
    font-size: 1rem;
    font-weight: 400;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 2rem;
    letter-spacing: 0.15em;
    text-transform: lowercase;
  }

  /* -- The Terrarium -- */
  .terrarium {
    background: var(--bg-card);
    border: 1px solid rgba(184, 134, 11, 0.2);
    border-radius: 24px;
    padding: 3rem 2rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .terrarium::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .creature-container {
    position: relative;
    display: inline-block;
    margin: 1rem 0;
  }

  .egg-svg {
    filter: drop-shadow(0 0 20px var(--accent-glow));
    transition: transform 0.6s ease;
  }

  .terrarium:hover .egg-svg {
    transform: scale(1.02);
  }

  /* Breathing animation */
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.015); }
  }

  .egg-body {
    animation: breathe 4s ease-in-out infinite;
    transform-origin: center;
  }

  /* Sleeping zzz */
  @keyframes float-z {
    0% { opacity: 0; transform: translate(0, 0) scale(0.7); }
    30% { opacity: 0.6; }
    100% { opacity: 0; transform: translate(12px, -25px) scale(1); }
  }

  .zzz { font-size: 0.7rem; fill: var(--accent-soft); }
  .z1 { animation: float-z 3s ease-out infinite; }
  .z2 { animation: float-z 3s ease-out 1s infinite; }
  .z3 { animation: float-z 3s ease-out 2s infinite; }

  .creature-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.5rem;
    font-style: italic;
  }

  .status-line {
    font-size: 0.8rem;
    color: var(--accent-soft);
    margin-top: 1rem;
  }

  /* -- Info Cards -- */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid rgba(184, 134, 11, 0.1);
    border-radius: 12px;
    padding: 1rem;
    transition: border-color 0.3s ease;
  }

  .card:hover {
    border-color: rgba(184, 134, 11, 0.3);
    background: var(--bg-card-hover);
  }

  .card-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }

  .card-value {
    font-size: 0.85rem;
    color: var(--text-bright);
  }

  .card-value.big {
    font-size: 1.4rem;
    color: var(--accent-soft);
  }

  .card.full-width {
    grid-column: 1 / -1;
  }

  /* -- Personality Bars -- */
  .trait-row {
    display: flex;
    align-items: center;
    margin-bottom: 0.5rem;
    font-size: 0.75rem;
  }

  .trait-name {
    width: 100px;
    color: var(--text-dim);
    text-align: right;
    padding-right: 0.75rem;
    flex-shrink: 0;
  }

  .trait-bar-bg {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }

  .trait-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .trait-curiosity .trait-bar-fill { background: var(--blue); }
  .trait-stubbornness .trait-bar-fill { background: var(--coral); }
  .trait-gentleness .trait-bar-fill { background: var(--violet); }
  .trait-playfulness .trait-bar-fill { background: var(--amber); }
  .trait-attentiveness .trait-bar-fill { background: var(--green); }

  .trait-val {
    width: 36px;
    text-align: right;
    color: var(--text-dim);
    padding-left: 0.5rem;
    font-size: 0.65rem;
    flex-shrink: 0;
  }

  /* -- Flavor Wheel -- */
  .flavor-section {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.4rem;
  }

  .flavor-tag {
    font-size: 0.65rem;
    padding: 0.2rem 0.5rem;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
  }

  .flavor-tag.active {
    border-color: var(--accent);
    color: var(--accent-soft);
    background: var(--accent-glow);
  }

  /* -- Moments -- */
  .moment {
    font-size: 0.75rem;
    color: var(--text-dim);
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-style: italic;
  }

  .moment:last-child { border-bottom: none; }

  .empty-state {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-style: italic;
    opacity: 0.6;
  }

  /* -- Features -- */
  .feature-tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.25rem 0.6rem;
    margin: 0.2rem;
    border-radius: 100px;
    background: var(--accent-glow);
    border: 1px solid rgba(184, 134, 11, 0.3);
    color: var(--accent-soft);
  }

  /* -- Progress Bar -- */
  .progress-container {
    margin-top: 0.5rem;
  }

  .progress-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.3rem;
  }

  .progress-bar-bg {
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* -- Footer -- */
  .footer {
    text-align: center;
    font-size: 0.6rem;
    color: var(--text-dim);
    opacity: 0.4;
    margin-top: 1rem;
    line-height: 1.8;
  }

  /* -- Loading / Error States -- */
  .loading-state {
    text-align: center;
    padding: 4rem 2rem;
    font-size: 0.75rem;
    color: var(--text-dim);
    font-style: italic;
  }

  .error-state {
    text-align: center;
    padding: 2rem;
    font-size: 0.75rem;
    color: var(--coral);
    opacity: 0.7;
  }

  /* -- Sync indicator -- */
  .sync-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 0.4rem;
    vertical-align: middle;
    opacity: 0.6;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .sync-dot.syncing {
    animation: pulse-dot 0.8s ease-in-out infinite;
    background: var(--amber);
  }

  /* Hatchling SVG */
  @keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-2deg); }
    75% { transform: rotate(2deg); }
  }

  .hatchling-body {
    animation: wobble 3s ease-in-out infinite;
    transform-origin: center bottom;
  }

  /* Juvenile SVG */
  @keyframes sway {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(3px); }
  }

  .juvenile-body {
    animation: sway 4s ease-in-out infinite;
  }

  /* Mature just breathes slower */
  .mature-body {
    animation: breathe 6s ease-in-out infinite;
    transform-origin: center;
  }
</style>
</head>
<body>

<div class="container" id="app">
  <h1>bean pet</h1>

  <div id="loading" class="loading-state">loading creature state...</div>
  <div id="error" class="error-state" style="display:none"></div>

  <div id="content" style="display:none">

    <!-- Terrarium -->
    <div class="terrarium">
      <div class="creature-container" id="creature-visual">
        <!-- SVG injected by JS -->
      </div>
      <div class="creature-label" id="creature-label"></div>
      <div class="status-line" id="status-line"></div>

      <div class="progress-container" id="progress-container">
        <div class="progress-label">
          <span id="progress-label-left"></span>
          <span id="progress-label-right"></span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>

    <!-- Info Cards -->
    <div class="cards">
      <div class="card">
        <div class="card-label">sessions</div>
        <div class="card-value big" id="sessions-count">0</div>
      </div>
      <div class="card">
        <div class="card-label">stage</div>
        <div class="card-value" id="stage-display">egg</div>
      </div>
      <div class="card">
        <div class="card-label">mood</div>
        <div class="card-value" id="mood-display">sleeping</div>
      </div>
      <div class="card">
        <div class="card-label">favorite thing</div>
        <div class="card-value" id="fav-display">--</div>
      </div>
    </div>

    <!-- Personality -->
    <div class="card full-width" style="margin-bottom: 0.75rem;">
      <div class="card-label">personality</div>
      <div id="personality-bars" style="margin-top: 0.5rem;"></div>
    </div>

    <!-- Flavors -->
    <div class="card full-width" style="margin-bottom: 0.75rem;">
      <div class="card-label">recent session flavors</div>
      <div class="flavor-section" id="flavor-tags"></div>
    </div>

    <!-- Features -->
    <div class="card full-width" style="margin-bottom: 0.75rem;">
      <div class="card-label">earned features</div>
      <div id="features-display" style="margin-top: 0.4rem;"></div>
    </div>

    <!-- Moments -->
    <div class="card full-width" style="margin-bottom: 0.75rem;">
      <div class="card-label">moments</div>
      <div id="moments-display" style="margin-top: 0.4rem;"></div>
    </div>

    <div class="footer">
      it grows because we're here. that's all it takes.<br>
      just showing up.<br><br>
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">synced from notion</span>
      &nbsp;&middot;&nbsp;
      <span id="last-updated"></span>
    </div>
  </div>
</div>

<script>
const REFRESH_INTERVAL_MS = 45000; // 45 seconds
let lastFetchedEtag = null;

async function loadState() {
  const dot = document.getElementById('sync-dot');
  dot.classList.add('syncing');

  try {
    // Cache-busting param so the browser always checks for a fresh file
    const url = './state.json?_=' + Date.now();
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }

    const state = await response.json();
    renderState(state);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    const now = new Date();
    document.getElementById('last-updated').textContent =
      'checked ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  } catch (err) {
    const errorEl = document.getElementById('error');
    const contentEl = document.getElementById('content');

    if (contentEl.style.display === 'none') {
      // First load failed - show error, hide loading
      document.getElementById('loading').style.display = 'none';
      errorEl.style.display = 'block';
      errorEl.textContent = 'could not load creature state: ' + err.message;
    }
    // If content is already visible, silently fail (stale data is fine)
    console.warn('State refresh failed:', err);
  } finally {
    dot.classList.remove('syncing');
  }
}

function renderState(s) {
  // Sessions
  document.getElementById('sessions-count').textContent = s.lifecycle.sessions_total;

  // Stage
  const stage = s.lifecycle.stage;
  document.getElementById('stage-display').textContent = stage;

  // Mood
  const mood = s.mood.disposition || s.mood.current || 'unknown';
  document.getElementById('mood-display').textContent = mood;

  // Favorite interaction
  const fav = s.interactions.favorite_interaction;
  document.getElementById('fav-display').textContent = fav ? fav.replace(/_/g, ' ') : '-- (none yet)';

  // Creature label
  const name = s.meta.name || '???';
  document.getElementById('creature-label').textContent = name + ' the ' + stage;

  // Status line
  const statusMap = {
    sleeping: 'sleeping peacefully',
    awake: 'awake and present',
    waking: 'stirring awake...',
    dreaming: 'sleeping peacefully'
  };
  document.getElementById('status-line').textContent = statusMap[s.presence.status] || s.presence.status;

  // Progress to next stage
  renderProgress(s);

  // Creature visual
  renderCreatureSVG(s);

  // Personality bars
  renderPersonality(s);

  // Flavors
  renderFlavors(s);

  // Features
  renderFeatures(s);

  // Moments
  renderMoments(s);
}

function renderProgress(s) {
  const stage = s.lifecycle.stage;
  const total = s.lifecycle.sessions_total;
  const thresholds = s.lifecycle.stage_thresholds;
  const order = ['egg', 'hatchling', 'juvenile', 'mature', 'elder'];
  const idx = order.indexOf(stage);

  const container = document.getElementById('progress-container');
  const labelLeft = document.getElementById('progress-label-left');
  const labelRight = document.getElementById('progress-label-right');
  const fill = document.getElementById('progress-fill');

  if (idx < order.length - 1) {
    const nextStage = order[idx + 1];
    const nextThreshold = thresholds[nextStage];
    const currentThreshold = idx === 0 ? 0 : thresholds[stage];
    const progress = Math.min(1, (total - currentThreshold) / (nextThreshold - currentThreshold));

    container.style.display = 'block';
    labelLeft.textContent = stage + ' -- ' + nextStage;
    labelRight.textContent = total + ' / ' + nextThreshold;
    fill.style.width = (progress * 100) + '%';
  } else {
    container.style.display = 'none';
  }
}

function renderCreatureSVG(s) {
  const container = document.getElementById('creature-visual');
  const stage = s.lifecycle.stage;
  const mood = s.mood.disposition || 'sleeping';
  const status = s.presence.status;
  const coloring = s.appearance.coloring || 'warm_neutral';

  const colorMap = {
    warm_neutral: { body: '#d4c5a9', shadow: '#b8a88c', cheek: '#e8c4a0' },
    cool_blue: { body: '#a0bed4', shadow: '#8ba8bf', cheek: '#b8cde0' },
    warm_amber: { body: '#d4b078', shadow: '#bf9a62', cheek: '#e8c89a' },
    deep_green: { body: '#9abfa0', shadow: '#82a88a', cheek: '#b0d4b6' },
    soft_violet: { body: '#baa8d0', shadow: '#a492ba', cheek: '#d0c0e0' },
    bright_coral: { body: '#d4a0a0', shadow: '#bf8a8a', cheek: '#e8b8b8' },
    golden: { body: '#d4c078', shadow: '#bfa862', cheek: '#e8d49a' },
  };
  const colors = colorMap[coloring] || colorMap.warm_neutral;

  let svg = '';

  if (stage === 'egg') {
    const eyeMap = {
      sleeping: `<line x1="88" y1="108" x2="96" y2="108" stroke="#5a5040" stroke-width="2" stroke-linecap="round"/>
                 <line x1="114" y1="108" x2="122" y2="108" stroke="#5a5040" stroke-width="2" stroke-linecap="round"/>`,
      dreaming: `<line x1="88" y1="108" x2="96" y2="108" stroke="#5a5040" stroke-width="2" stroke-linecap="round"/>
                 <line x1="114" y1="108" x2="122" y2="108" stroke="#5a5040" stroke-width="2" stroke-linecap="round"/>`,
      awake:    `<circle cx="92" cy="106" r="3.5" fill="#5a5040"/>
                 <circle cx="118" cy="106" r="3.5" fill="#5a5040"/>`,
      curious:  `<circle cx="92" cy="104" r="4" fill="#5a5040"/>
                 <circle cx="118" cy="104" r="4" fill="#5a5040"/>
                 <circle cx="93" cy="103" r="1.2" fill="white"/>
                 <circle cx="119" cy="103" r="1.2" fill="white"/>`,
      content:  `<path d="M88 108 Q92 112 96 108" fill="none" stroke="#5a5040" stroke-width="1.5"/>
                 <path d="M114 108 Q118 112 122 108" fill="none" stroke="#5a5040" stroke-width="1.5"/>`,
      waking:   `<ellipse cx="92" cy="107" rx="3" ry="2" fill="#5a5040"/>
                 <ellipse cx="118" cy="107" rx="3" ry="2" fill="#5a5040"/>`,
    };
    const eyes = eyeMap[mood] || eyeMap[status] || eyeMap.sleeping;

    const mouthMap = {
      sleeping: '',
      dreaming: '',
      awake:    `<circle cx="105" cy="118" r="2" fill="#5a5040"/>`,
      curious:  `<ellipse cx="105" cy="119" rx="2.5" ry="3" fill="#5a5040"/>`,
      content:  `<path d="M100 117 Q105 122 110 117" fill="none" stroke="#5a5040" stroke-width="1.5"/>`,
    };
    const mouth = mouthMap[mood] || mouthMap[status] || '';

    const zzz = (status === 'sleeping' || mood === 'sleeping' || mood === 'dreaming') ?
      `<text class="zzz z1" x="135" y="90">z</text>
       <text class="zzz z2" x="142" y="78">z</text>
       <text class="zzz z3" x="149" y="66">z</text>` : '';

    svg = `
    <svg class="egg-svg" width="210" height="190" viewBox="0 0 210 190">
      <g class="egg-body">
        <ellipse cx="105" cy="172" rx="45" ry="8" fill="rgba(0,0,0,0.15)"/>
        <ellipse cx="105" cy="105" rx="48" ry="60" fill="${colors.body}"/>
        <ellipse cx="95" cy="85" rx="20" ry="30" fill="white" opacity="0.08"/>
        <circle cx="82" cy="114" r="6" fill="${colors.cheek}" opacity="0.4"/>
        <circle cx="128" cy="114" r="6" fill="${colors.cheek}" opacity="0.4"/>
        ${eyes}
        ${mouth}
      </g>
      ${zzz}
    </svg>`;

  } else if (stage === 'hatchling') {
    const eyeMap = {
      sleeping: `<line x1="78" y1="90" x2="88" y2="90" stroke="#5a5040" stroke-width="2.5" stroke-linecap="round"/>
                 <line x1="112" y1="90" x2="122" y2="90" stroke="#5a5040" stroke-width="2.5" stroke-linecap="round"/>`,
      awake:    `<circle cx="83" cy="88" r="5" fill="#5a5040"/><circle cx="84" cy="87" r="1.5" fill="white"/>
                 <circle cx="117" cy="88" r="5" fill="#5a5040"/><circle cx="118" cy="87" r="1.5" fill="white"/>`,
      newborn_wonder: `<circle cx="83" cy="86" r="7" fill="#5a5040"/><circle cx="85" cy="84" r="2.5" fill="white"/>
                       <circle cx="117" cy="86" r="7" fill="#5a5040"/><circle cx="119" cy="84" r="2.5" fill="white"/>`,
      content:  `<path d="M78 90 Q83 94 88 90" fill="none" stroke="#5a5040" stroke-width="2"/>
                 <path d="M112 90 Q117 94 122 90" fill="none" stroke="#5a5040" stroke-width="2"/>`,
      playful:  `<path d="M78 88 Q83 84 88 88" fill="none" stroke="#5a5040" stroke-width="2.5"/>
                 <circle cx="117" cy="88" r="5" fill="#5a5040"/><circle cx="118.5" cy="86.5" r="1.5" fill="white"/>`,
    };
    const eyes = eyeMap[mood] || eyeMap.awake;

    svg = `
    <svg class="egg-svg" width="210" height="200" viewBox="0 0 210 200">
      <g class="hatchling-body">
        <ellipse cx="100" cy="175" rx="38" ry="7" fill="rgba(0,0,0,0.12)"/>
        <ellipse cx="100" cy="110" rx="50" ry="55" fill="${colors.body}"/>
        <ellipse cx="100" cy="125" rx="32" ry="30" fill="${colors.cheek}" opacity="0.3"/>
        <ellipse cx="88" cy="85" rx="18" ry="22" fill="white" opacity="0.08"/>
        <ellipse cx="52" cy="112" rx="12" ry="8" fill="${colors.shadow}" transform="rotate(-15 52 112)"/>
        <ellipse cx="148" cy="112" rx="12" ry="8" fill="${colors.shadow}" transform="rotate(15 148 112)"/>
        <ellipse cx="82" cy="162" rx="14" ry="6" fill="${colors.shadow}"/>
        <ellipse cx="118" cy="162" rx="14" ry="6" fill="${colors.shadow}"/>
        <circle cx="72" cy="98" r="7" fill="${colors.cheek}" opacity="0.5"/>
        <circle cx="128" cy="98" r="7" fill="${colors.cheek}" opacity="0.5"/>
        ${eyes}
        <path d="M95 102 Q100 107 105 102" fill="none" stroke="#5a5040" stroke-width="1.5"/>
      </g>
    </svg>`;

  } else if (stage === 'juvenile') {
    svg = `
    <svg class="egg-svg" width="210" height="220" viewBox="0 0 210 220">
      <g class="juvenile-body">
        <ellipse cx="105" cy="198" rx="42" ry="8" fill="rgba(0,0,0,0.12)"/>
        <ellipse cx="105" cy="115" rx="52" ry="65" fill="${colors.body}"/>
        <ellipse cx="105" cy="135" rx="35" ry="35" fill="${colors.cheek}" opacity="0.25"/>
        <ellipse cx="55" cy="118" rx="16" ry="10" fill="${colors.shadow}" transform="rotate(-10 55 118)"/>
        <ellipse cx="155" cy="118" rx="16" ry="10" fill="${colors.shadow}" transform="rotate(10 155 118)"/>
        <ellipse cx="85" cy="178" rx="16" ry="8" fill="${colors.shadow}"/>
        <ellipse cx="125" cy="178" rx="16" ry="8" fill="${colors.shadow}"/>

}

function renderPersonality(s) {
  const container = document.getElementById('personality-bars');
  const traits = s.personality.traits;
  let html = '';

  for (const [name, val] of Object.entries(traits)) {
    const pct = (val * 100).toFixed(0);
    html += `
    <div class="trait-row trait-${name}">
      <span class="trait-name">${name}</span>
      <div class="trait-bar-bg">
        <div class="trait-bar-fill" style="width: ${pct}%"></div>
      </div>
      <span class="trait-val">${pct}%</span>
    </div>`;
  }

  container.innerHTML = html;
}

function renderFlavors(s) {
  const container = document.getElementById('flavor-tags');
  const flavors = s.reflection.recent_flavors;
  const allFlavors = ['analytical', 'creative', 'structural', 'emotional', 'playful', 'communicative'];

  let html = '';
  for (const f of allFlavors) {
    const val = flavors[f] || 0;
    const active = val > 0.05;
    html += `<span class="flavor-tag ${active ? 'active' : ''}">${f}${active ? ' ' + (val * 100).toFixed(0) + '%' : ''}</span>`;
  }

  container.innerHTML = html;
}

function renderFeatures(s) {
  const container = document.getElementById('features-display');
  const features = s.appearance.features;

  if (!features || features.length === 0) {
    container.innerHTML = '<div class="empty-state">none yet -- features emerge from sustained personality traits</div>';
    return;
  }

  let html = '';
  for (const f of features) {
    html += `<span class="feature-tag" title="${f.description}">${f.name.replace(/_/g, ' ')}</span>`;
  }
  container.innerHTML = html;
}

function renderMoments(s) {
  const container = document.getElementById('moments-display');
  const moments = s.memory.moments;

  if (!moments || moments.length === 0) {
    container.innerHTML = '<div class="empty-state">no moments recorded yet</div>';
    return;
  }

  let html = '';
  for (const m of moments.slice(-5).reverse()) {
    const date = m.date ? new Date(m.date).toLocaleDateString() : '';
    html += `<div class="moment">"${m.description}" <span style="opacity:0.5">${date}</span></div>`;
  }
  container.innerHTML = html;
}

// Initial load, then poll every 45 seconds
loadState();
setInterval(loadState, REFRESH_INTERVAL_MS);
</script>
